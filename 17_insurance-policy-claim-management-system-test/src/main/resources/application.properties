spring.application.name=insurance-policy-claim-management-system

spring.config.import=file:env.properties

spring.datasource.url=jdbc:mysql://localhost:3306/insurance_test_db

spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


server.port=8081

springdoc.swagger-ui.path=/swagger-ui.html

logging.level.root=INFO
logging.level.com.insurance.demo = DEBUG

# JWT configuration
app.jwt.secret=${JWT_KEY}

app.jwt.expiration-ms=6000000


cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_SECRET}

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# mail 
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USER}
spring.mail.password=${EMAIL_PASSWORD}

spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.otp.expiry-minutes=5

# twilio
app.twilio.account-sid=${TWILIO_SID}
app.twilio.auth-token=${TWILIO_TOKEN}
app.twilio.from-phone=${TWILIO_PHONE}

